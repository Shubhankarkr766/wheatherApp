<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="wrapper">

        <h1>Weather App</h1>

        <div class="tab-container">

            <p class="tab" data-userWeather>Your Weather</p>
            <p class="tab" data-searchWeather>Search Weather</p>
        </div>

        <div class="weather-container">

            <!-- grant location container -->
             <div class="sub-container grant-location-container">
                <img src="./assets/location.png" width="80" height="" loading="lazy">
                <p>Grant Location Access</p>
                <p>Allow Acess to get Weather Information </p>
                <button class="btn" data-grantAccess>Grant Access</button>
             </div>

             <!-- Search Form -->
              <form class="form-container"data-searchForm>
                <input placeholder="search for city..." data-searchInput>
                <button class="btn">
                    <img src="./assets/search.png" width="20" height="20" loading="lazy">
                </button>
              </form>

              <!-- loading screen container -->
               <div class="sub-container loading-container">
                <img src="./assets/loading.gif" width="150" height="150">
                <p>Loading</p>
               </div>

               <!-- error container -->
                <div class="sub-container error-container">
                <img src="./assets/not-found.png" width="200" height="200"/>
                <p class="error-msg"></p>
                </div>

               <!-- show weather Info -->
                <div class="sub-container user-info-container">

                    <!-- city name and flag -->
                    <div class="name">
                        <p data-cityName></p>
                        <img data-countryIcon>
                    </div>
                    <!-- weather Description -->

                    <p data-weatherDesc></p>
                    <!-- weather Icon -->
                    <img data-weatherIcon>
                    <!-- temperature Data -->
                    <p data-temp> </p>

                    <div class="parameter-container">
                        <!-- card 1 -->
                        <div class="parameter">
                            <img src="./assets/wind.png">
                            <p>windspeed</p>
                            <p data-windspeed></p>
                        </div>

                         <!-- card 2 -->
                        <div class="parameter">
                            <img src="./assets/humidity.png">
                            <p>Humidity</p>
                            <p data-humidity></p>
                        </div>

                         <!-- card 3  -->
                        <div class="parameter">
                            <img src="./assets/cloud.png">
                            <p>Clouds</p>
                            <p data-cloudiness ></p>
                        </div>
                    </div>
                </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
